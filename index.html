<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khunji.org | Launching Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1e3c72);
            --accent-color: #00d2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: var(--primary-gradient);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-card {
            position: relative;
            text-align: center;
            padding: 4rem 2rem;
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            z-index: 1;
            animation: cardEntrance 1.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(100px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Floating Icon */
        .icon-box {
            font-size: 4rem;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.5));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .main-title {
            font-size: clamp(3rem, 10vw, 6.5rem); /* Fluid typography */
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.85;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff 40%, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .brand-label {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 10px;
            color: var(--accent-color);
            text-transform: uppercase;
            margin-bottom: 2.5rem;
            display: block;
            opacity: 0.8;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 100px;
            font-size: 0.9rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            70% { transform: scale(2.5); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        /* Responsive Design tweaks */
        @media (max-width: 480px) {
            .main-card { padding: 3rem 1.5rem; border-radius: 35px; }
            .brand-label { letter-spacing: 5px; font-size: 1rem; }
            .icon-box { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="icon-box">
            <i class="fa-solid fa-rocket"></i>
        </div>
        
        <h1 class="main-title">Coming<br>Soon!</h1>
        
        <span class="brand-label">KHUNJI.ORG</span>

        <div class="status-badge">
            <div class="pulse-dot"></div>
            System Initializing
        </div>
    </div>

    <div class="footer">
        © 2026 Crafted by Khunji • Global Access
    </div>

</body>
</html>
