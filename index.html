<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khunji.org | Experience the Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color1: #ff3cac;
            --color2: #784ba0;
            --color3: #2b86c5;
            --color4: #00d2ff;
        }

        /* Prevent scrolling on both html and body */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Strict no-scroll */
            position: fixed; /* Prevents "pull-to-refresh" on some mobile browsers */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            /* Using dvh for exact mobile height */
            height: 100dvh; 
            font-family: 'Poppins', sans-serif;
        }

        /* Animated Background Mesh */
        .bg-mesh {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, var(--color1), var(--color2), var(--color3), var(--color4));
            background-size: 400% 400%;
            animation: meshAnimation 10s ease infinite;
            z-index: -2;
        }

        @keyframes meshAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Blobs */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--color4);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: moveBlob 15s infinite alternate;
        }

        .blob-2 {
            background: var(--color1);
            right: -50px;
            top: -50px;
            animation-duration: 10s;
        }

        @keyframes moveBlob {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(15%, 15%); }
        }

        .main-card {
            text-align: center;
            padding: 3rem 2rem;
            width: 85%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            animation: cardFade 1.2s ease-out;
            z-index: 1;
        }

        @keyframes cardFade {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .icon-box {
            font-size: clamp(3rem, 10vw, 4.5rem);
            margin-bottom: 1rem;
            display: inline-block;
            background: linear-gradient(to bottom, #fff, var(--color4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .main-title {
            font-size: clamp(2.8rem, 12vw, 5.5rem);
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 1rem;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #fff, var(--color4), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .brand-label {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: 400;
            letter-spacing: 8px;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 2rem;
            display: block;
            opacity: 0.9;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 0.7rem;
            color: #fff;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .footer a:hover {
            color: var(--color4);
        }

        /* Mobile specific adjustments to ensure NO overflow */
        @media (max-height: 600px) {
            .main-card { padding: 2rem 1rem; }
            .icon-box { margin-bottom: 0.5rem; }
            .brand-label { margin-bottom: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div class="blob"></div>
    <div class="blob blob-2"></div>

    <div class="main-card">
        <div class="icon-box">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
        </div>
        
        <h1 class="main-title">Coming<br>Soon!</h1>
        
        <span class="brand-label">KHUNJI.ORG</span>

        <div class="status-badge">
            <div class="dot"></div>
            DESIGNING EXCELLENCE
        </div>
    </div>

    <div class="footer">
        © 2026 KHUNJI • By <a href="https://frexweb.com" target="_blank">Frexweb.com</a>
    </div>

</body>
</html>
