<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khunji.org | Launching Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Enhanced & Faster Animated Background */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            padding: 3rem;
            /* A glassmorphism effect for the content area */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            color: white;
            width: 90%;
            max-width: 900px;
            /* Entrance animation for the whole container */
            animation: containerEntrance 1.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes containerEntrance {
            0% { opacity: 0; transform: scale(0.8) translateY(50px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* VERY BIG AND BOLD MAIN TITLE */
        .main-title {
            font-size: 6rem; /* Huge size */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.9;
            margin-bottom: 0.5rem;
            
            /* Text Shimmer Animation */
            background: linear-gradient(90deg, #fff, #81d4fa, #fff, #81d4fa);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShimmer 4s infinite linear;
            text-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        /* Site name subtitle */
        .brand-subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeDelayed 1s ease-out 1.2s forwards;
        }

        @keyframes textShimmer {
            0% { background-position: 100% 0; }
            100% { background-position: 0 0; }
        }

        @keyframes fadeDelayed {
            to { opacity: 1; }
        }

        /* Basic footer */
        .footer {
            position: absolute;
            bottom: 25px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        /* Responsive adjustments for mobile */
        @media (max-width: 768px) {
            .main-title { font-size: 3.5rem; letter-spacing: -1px; }
            .brand-subtitle { font-size: 1rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="main-title">Coming Soon!</h1>
        <div class="brand-subtitle">khunji.org</div>
    </div>

    <div class="footer">
        © 2026 KHUNJI.ORG • Under Construction
    </div>

</body>
</html>
