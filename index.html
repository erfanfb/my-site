<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khunji.org | Experience the Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color1: #ff3cac;
            --color2: #784ba0;
            --color3: #2b86c5;
            --color4: #00d2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        /* Animated Background Mesh */
        .bg-mesh {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, var(--color1), var(--color2), var(--color3), var(--color4));
            background-size: 400% 400%;
            animation: meshAnimation 10s ease infinite;
            z-index: -2;
        }

        @keyframes meshAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Blobs for extra movement */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--color4);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: moveBlob 20s infinite alternate;
        }

        .blob-2 {
            background: var(--color1);
            right: -100px;
            top: -100px;
            animation-duration: 15s;
        }

        @keyframes moveBlob {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        .main-card {
            text-align: center;
            padding: 5rem 3rem;
            width: 90%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5);
            animation: cardFade 1.2s ease-out;
        }

        @keyframes cardFade {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .icon-box {
            font-size: 4.5rem;
            margin-bottom: 2rem;
            display: inline-block;
            background: linear-gradient(to bottom, #fff, var(--color4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .main-title {
            font-size: clamp(3.5rem, 12vw, 7.5rem);
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.85;
            margin-bottom: 1.5rem;
            letter-spacing: -3px;
            /* Animated Text Gradient */
            background: linear-gradient(90deg, #fff, var(--color4), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .brand-label {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 12px;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 3rem;
            display: block;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 0.8rem;
            color: #fff;
            letter-spacing: 3px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ff88;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .main-card { padding: 4rem 1rem; border-radius: 40px; }
            .main-title { letter-spacing: -1px; }
            .brand-label { letter-spacing: 6px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div class="blob"></div>
    <div class="blob blob-2"></div>

    <div class="main-card">
        <div class="icon-box">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
        </div>
        
        <h1 class="main-title">Coming<br>Soon!</h1>
        
        <span class="brand-label">KHUNJI.ORG</span>

        <div class="status-badge">
            <div class="dot"></div>
            DESIGNING EXCELLENCE
        </div>
    </div>

    <div class="footer">
        © 2026 KHUNJI • DIGITAL CREATIVE STUDIO
    </div>

</body>
</html>
